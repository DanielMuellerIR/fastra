name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-tests:
    name: Swift-Tests
    # Fastras aufgelöste Abhängigkeiten benötigen Swift 6.2. Der offizielle
    # macOS-26-Runner stellt Xcode 26 auf Apple Silicon bereit.
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Lokalisierungswerkzeug installieren
        run: brew install ripgrep

      - name: Abhängigkeiten vorbereiten und App bauen
        working-directory: app
        run: ./build.sh

      - name: Swift-Tests ausführen
        working-directory: app
        # Mehrere Tests prüfen reale Prozesse und asynchrone Main-Queue-
        # Übergaben. Swift Testing startet sie sonst gleichzeitig und kann auf
        # dem Hosted Runner die gemeinsamen Worker-Pools so stark auslasten,
        # dass korrekte Abschluss-Callbacks erst nach den Testfristen ankommen.
        run: swift test --no-parallel

      - name: Lokalisierung prüfen
        working-directory: app
        run: ./localization-audit.sh
